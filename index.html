<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="60"> <!-- Reload alle 60 Sekunden -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        /* Reset & Basics */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f9f9f9;
            color: #111;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem;
        }

        /* Wrapper */
        .wrapper {
            max-width: 1200px;
            width: 100%;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        /* Card */
        .card {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card h2 {
            font-weight: 500;
            font-size: 1.2rem;
            padding: 1rem;
            text-align: center;
        }

        .card img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .card h2 {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="grid">
            <div class="card">
                <h2>Temperatur (Bash)</h2>
                <img src="/cgi-bin/bild_erstellen.sh" alt="Temperatur Bash">
            </div>
            <div class="card">
                <h2>Temperatur (Python)</h2>
                <img src="/cgi-bin/bild_erstellen.py" alt="Temperatur Python">
            </div>
            <div class="card">
                <h2>Luftdruck</h2>
                <img src="/cgi-bin/pressure_pic.py" alt="Luftdruck">
            </div>
        </div>
    </div>
</body>
</html>
